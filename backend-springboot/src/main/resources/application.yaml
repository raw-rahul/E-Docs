spring:
  application:
    name: backend-springboot

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  #  autoconfigure:
  #    exclude:
  #      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5433/exams_constraints
    username: postgres
    password: 2000
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080
  tomcat:
    max-swallow-size: -1